name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "1.8.3"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: python -m pip install "poetry==$POETRY_VERSION"
      - name: Install locked dependencies
        run: poetry install --with dev --sync
      - name: Validate metadata and lock
        run: poetry check
      - name: Run tests with production coverage gate
        run: poetry run pytest src/html2md/tests tests/config --cov=html2md --cov-report=term-missing:skip-covered

  package:
    name: Build and wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: python -m pip install "poetry==$POETRY_VERSION"
      - name: Build distributions
        run: poetry build
      - name: Verify wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = archive.namelist()
          assert not any(name.startswith("html2md/tests/") for name in names)
          assert "html2md/html2md" not in names
          assert "html2md/__main__.py" in names
          PY
      - name: Run extension static regressions
        run: |
          for file in extension/*.js extension/tests/*.js; do node --check "$file"; done
          node --test extension/tests/*.test.js
          node extension/tests/chromium-smoke.js
      - name: Install and exercise the wheel
        run: |
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/wheel-smoke/bin/html2md" --help
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m html2md --help

  quality:
    name: Static quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: python -m pip install "poetry==$POETRY_VERSION"
      - name: Install locked dependencies
        run: poetry install --with dev --sync
      - name: Ruff
        run: poetry run ruff check src/html2md tests/config
      - name: Black
        run: poetry run black --check src/html2md tests/config
      - name: Mypy
        run: poetry run mypy src/html2md tests/config
