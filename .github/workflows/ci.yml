name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "2.4.1"
  POETRY_EXPORT_VERSION: "1.10.0"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: >-
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
          "poetry-plugin-export==${{ env.POETRY_EXPORT_VERSION }}"
      - name: Install locked dependencies
        run: poetry sync --with dev
      - name: Validate metadata and lock
        run: poetry check --lock
      - name: Run tests with production coverage gate
        run: poetry run pytest src/grab2md/tests tests/config --cov=grab2md --cov-report=term-missing:skip-covered

  package:
    name: Build and wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: >-
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
          "poetry-plugin-export==${{ env.POETRY_EXPORT_VERSION }}"
      - name: Install locked development tools
        run: poetry sync --with dev
      - name: Build distributions
        run: poetry build
      - name: Validate distribution metadata and rendered README
        run: poetry run twine check dist/*
      - name: Verify wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = archive.namelist()
          assert not any(name.startswith("grab2md/tests/") for name in names)
          assert "grab2md/grab2md" not in names
          assert "grab2md/__main__.py" in names
          PY
      - name: Run extension static regressions
        run: |
          for file in extension/*.js extension/tests/*.js; do node --check "$file"; done
          node --test extension/tests/*.test.js
      - name: Install and exercise the wheel
        run: |
          poetry run python scripts/release_smoke.py dist/*.whl \
            --expected-version "$(poetry version --short)"

  quality:
    name: Static quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: >-
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
          "poetry-plugin-export==${{ env.POETRY_EXPORT_VERSION }}"
      - name: Install locked dependencies
        run: poetry sync --with dev
      - name: Ruff
        run: poetry run ruff check src/grab2md tests/config
      - name: Black
        run: poetry run black --check src/grab2md tests/config
      - name: Mypy
        run: |
          poetry run mypy src/grab2md tests/config
          poetry run mypy --check-untyped-defs \
            --exclude 'src/grab2md/tests/' src/grab2md
      - name: Bandit
        run: poetry run bandit -r src/grab2md -x src/grab2md/tests -ll
      - name: Audit locked development environment
        run: poetry run pip-audit

  portable:
    name: Portable package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: >-
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
          "poetry-plugin-export==${{ env.POETRY_EXPORT_VERSION }}"
      - name: Install locked dependencies
        run: poetry sync --with dev
      - name: Validate metadata and platform contracts
        run: |
          poetry check --lock
          poetry run pytest -q src/grab2md/tests tests/config
      - name: Build and smoke-test the installed wheel
        run: |
          poetry build
          poetry run python -c "from pathlib import Path; import subprocess, sys; wheel = next(Path('dist').glob('*.whl')); subprocess.check_call([sys.executable, 'scripts/release_smoke.py', str(wheel)])"

  browser-render:
    name: Chromium runtime checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: >-
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
          "poetry-plugin-export==${{ env.POETRY_EXPORT_VERSION }}"
      - name: Install render extra and Chromium
        run: |
          poetry sync --with dev --extras render
          poetry run playwright install --with-deps chromium
      - name: Audit render dependencies
        run: |
          poetry export --only main --extras render --without-hashes \
            --format requirements.txt --output "$RUNNER_TEMP/render-requirements.txt"
          poetry run pip-audit --requirement "$RUNNER_TEMP/render-requirements.txt"
      - name: Exercise static and rendered fixtures
        env:
          GRAB2MD_RUN_RENDER_E2E: "1"
        run: |
          poetry run pytest -q src/grab2md/tests/test_browser_renderer_e2e.py
          export CHROME_BIN="$(poetry run python -c 'from playwright.sync_api import sync_playwright; p = sync_playwright().start(); print(p.chromium.executable_path); p.stop()')"
          node extension/tests/chromium-smoke.js
