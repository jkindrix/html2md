[tool.poetry]
name = "html2md"
version = "1.0.0"
description = "A Python package to convert web pages to markdown"
authors = ["Justin Kindrix <jkindrix@gmail.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "html2md", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
beautifulsoup4 = "*"
certifi = "*"
charset-normalizer = "*"
idna = "*"
markdownify = "*"
requests = "*"
six = "*"
soupsieve = "*"
typing-extensions = "*"
urllib3 = "*"
browser-cookie3 = "*"
jeepney = "*"
lz4 = "*"
pycryptodomex = "*"
python-json-logger = "*"
pyjwt = "*"
google-auth-oauthlib = "1.2.1"
google-auth = "2.38.0"
typer = {extras = ["all"], version = "^0.9.0"}
rich = "^13.7.0"

[tool.poetry.group.dev.dependencies]
pytest = "*"
pre-commit = "*"
types-requests = "^2.32.0.20250328"

[tool.poetry.scripts]
html2md = "html2md.cli.main:main"
html2md-modern = "html2md.cli.modern_ui:entry_point"

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = ["--import-mode=append"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
