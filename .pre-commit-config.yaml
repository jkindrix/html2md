repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(extension/|chatgpt_tools/)
      - id: end-of-file-fixer
        exclude: ^(extension/|chatgpt_tools/)
      - id: check-yaml
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^(src/html2md/|tests/config/).*\.py$
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        files: ^(src/html2md/|tests/config/).*\.py$
        language_version: python3.11
        args: ["--fix"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "src/html2md", "-x", "src/html2md/tests", "-ll"]
        pass_filenames: false

  - repo: https://github.com/pypa/pip-audit
    rev: v2.8.0
    hooks:
      - id: pip-audit
        args: ["--requirement", "requirements.txt"]

  - repo: local
    hooks:
      - id: mypy
        name: run mypy
        entry: poetry run mypy
        args: ["src/html2md", "tests/config"]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: tests
        name: run tests
        entry: poetry run pytest
        args: ["--no-header", "-x", "src/html2md/tests", "tests/config"]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
