repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^extension/
      - id: end-of-file-fixer
        exclude: ^extension/
      - id: check-yaml
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        files: ^(?:(?:src/grab2md/|tests/config/|tests/scripts/).*|scripts/check_package_readme)\.py$
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        files: ^(?:(?:src/grab2md/|tests/config/|tests/scripts/).*|scripts/check_package_readme)\.py$
        language_version: python3.11
        args: ["--fix"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "src/grab2md", "-x", "src/grab2md/tests", "-ll"]
        pass_filenames: false

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.1
    hooks:
      - id: pip-audit
        args: ["--requirement", "requirements.txt"]

  - repo: local
    hooks:
      - id: requirement-export-drift
        name: verify requirement exports match poetry.lock
        entry: python scripts/check_requirement_exports.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: package-readme-links
        name: reject relative package-description links
        entry: python scripts/check_package_readme.py README.md
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: mypy
        name: run mypy
        entry: poetry run mypy
        args: ["src/grab2md", "tests/config", "tests/scripts", "scripts/check_package_readme.py"]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: mypy-production-bodies
        name: check untyped production bodies
        entry: poetry run mypy --check-untyped-defs --exclude src/grab2md/tests/ src/grab2md
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

      - id: tests
        name: run tests
        entry: poetry run pytest
        args: ["--no-header", "-x", "src/grab2md/tests", "tests/config", "tests/scripts"]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
